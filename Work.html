<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
           
            font-family: Poppins;
            color: white;
        }
        body{
            background-color: #242424;
        }

        Nav {
           
            font-weight: 700;
            margin: 2rem;
            border-radius: 15px;
        }

        Nav ul {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5rem;
            list-style-type: none;
            font-size: 1.3rem;
        }

        Nav a {
            text-decoration: none;
        }

        Nav Button {
            font-size: 1.3rem;
            padding: 15px;
            background-color: #242424;
            border-radius: 15px;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
          
            height: 80vh;
        }

        h1 {
            font-size: 5rem;
            position: relative;
            bottom: 1rem;
            margin-bottom: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 80%;
        }

        .box {
            background-color: #444;
            border-radius: 15px;
            height: 30vh;
            text-align: center;
            border-radius: 8px;
        }

        ion-icon {
            margin-top: 1.8rem;
            font-size: 2.5rem;
        }

        img {
            width: 30%;
        }

        .divLog {
            display: flex;
            gap: 1rem;
        }

        .grid-container img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .box:hover {
            cursor: pointer;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <Nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Experience.html">Experience</a></li>
            <li><a href="About.html">About me</a></li>
            <li>
                <Button><a href="">Contact</a></Button>
            </li>
        </ul>
    </Nav>

    <main>
        <h1>My Work</h1>
        <div class="grid-container">
            <div class="box" data-url="page1.html">
                <img src="VivreDeboutImageAccueil.png" alt="Image 1">
            </div>
            <div class="box" data-url="veille.html">
                <img src="IA.png" alt="Image 2">
            </div>
            <div class="box" data-url="page3.html">
                <img src="Library.png" alt="Image 3">
            </div>
            <div class="box" data-url="page4.html">
                <img src="challenge.png" alt="Image 4">
            </div>
            <div class="box" data-url="https://www.canva.com/design/DAF6c_X82bI/GSmXSG9Ql476bkSNnR5qiA/edit?utm_content=DAF6c_X82bI&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton">
                <img src="Taste.png" alt="Image 5">
            </div>
            <div class="box" data-url="Ap3.html">
                <img src="Ap3.png" alt="Ap3">
            </div>
            
        </div>
    </main>

    <script>
        document.querySelectorAll('.box').forEach(box => {
            box.addEventListener('click', () => {
                const url = box.getAttribute('data-url');
                if (url) {
                    window.location.href = url;
                }
            });
        });
    </script>
</body>
</html>
