<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
      color: white;
    }

    body {
      background-color: #242424;
    }

    nav {
      font-weight: 700;
      margin: 2rem;
      border-radius: 15px;
      position: relative;
    }

    nav ul {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 5rem;
      list-style-type: none;
      font-size: 1.3rem;
    }

    nav a {
      text-decoration: none;
      color: white;
    }

    nav button {
      font-size: 1.3rem;
      padding: 15px;
      background-color: #242424;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    .menuIcon {
      cursor: pointer;
      display: none;
      margin: 6rem auto 0 auto;
      color: white;
      font-size: 4rem;
    }

    .closeMenuButton {
      position: absolute;
      left: 0;
      top: 2rem;
      cursor: pointer;
    }

    .menuSlider {
      height: 0;
      overflow: hidden;
      z-index: 1;
      left: 0;
      width: 100%;
      position: absolute;
      top: 0;
      background-color: #242424;
      transition: height 0.3s ease-in-out;
    }

    .menuSlider.showMenuSlider {
      height: 200px;
    }

    .menuSlider ul {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      font-size: 1.5rem;
      position: relative;
    }

    @media (max-width: 750px) {
      nav ul {
        gap: 1.5rem;
      }
    }

    @media (max-width: 548px) {
      nav ul {
        display: none;
      }

      .menuIcon {
        display: block;
      }

      img {
        margin-top: 4rem;
      }
    }

 

    main {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-areas:
    "div2"
    "div1";
  justify-items: center;
  align-items: center;
  justify-content: center;

  margin-top: 5rem;
  padding: 2rem;
  gap: 2rem;
}



@media(min-width: 1068px) {
  main {
    grid-template-columns: 1fr 1fr;
    grid-template-areas: "div1 div2";
    justify-items: center;
    align-items: center;
  }
}

    h1 {
      font-size: 4rem;
      line-height: 1.7;
      text-align: justify;
      margin-bottom: 1.5rem;
    }

    .div1 p:first-of-type {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      text-align: justify;
    }

    .div1 p:last-child {
      text-align: justify;
    }

    ion-icon {
      margin-top: 1.8rem;
      font-size: 2.5rem;
    }

    img {
      width: 100%;
      max-width: 500px;
    }

    .divLog {
      display: flex;
      gap: 1rem;
      cursor: pointer;
    }

    .b {
      position: relative;
      top: 1rem;
      background-color: #242424;
      left: 2rem;
      padding: 10px 15px;
      border-radius: 15px;
      cursor: pointer;
    }

    .navButton ,.menuSlider button {
      font-weight: 700;
      font-size: 1.3rem;
            padding: 15px;
            background-color: black;
            border-radius: 15px;
    }
 
  

    /* Styles pour la modale */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.9);
    }

    .modal-content {
      position: relative;
      margin: auto;
      padding: 20px;
      width: 90%;
      max-width: 1200px;
      background-color: #242424;
      border-radius: 15px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
    }

    .close:hover,
    .close:focus {
      color: #bbb;
      text-decoration: none;
      cursor: pointer;
    }

    .modal-content embed {
      width: 100%;
      height: 90vh;
      display: flex;
      justify-content: center;
    }

    .download {
      position: absolute;
      right: 2rem;
      bottom: 2rem;
      padding: 20px;
      font-weight: 700;
      cursor: pointer;
      background-color: #242424;
      border: none;
      border-radius: 15px;
      color: white;
    }

    /* Ajout de la règle de média pour les h1 */
    @media (max-width: 440px) {
      h1 {
        font-size: 1.4rem;
      }
   
    }
  </style>
</head>

<body>
  <nav>
    <ul class="menuContent">
      <li><a href="Work.html">Work</a></li>
      <li><a href="About.html">About me</a></li>
      <li>
        <button class="navButton" onclick="location.href='mailto:bousseirid@gmail.com'">Contact</button>
      </li>
    </ul>
    <ion-icon class="menuIcon" name="menu-outline"></ion-icon>
    <div class="menuSlider">
      <ul>
        <li><a href="About.html">About me</a></li>
        <button  onclick="location.href='mailto:bousseirid@gmail.com'">Contact</button>
        <li><a href="Work.html">Work</a></li>
        <ion-icon class="closeMenuButton" name="close-circle-outline"></ion-icon>
      </ul>
    </div>
  </nav>

  <main>
    <!-- Premier grid -->
    <div class="div1" style="grid-area: div1;">
      <h1>
        Hi, I am <br> Dalil Bousseiri
      </h1>
      <p>Full stack developer</p>
      <p>Je suis un développeur passionné avec une envie constante d'évoluer. <br> Mon objectif  est de consolider mes connaissances , <br> d'en apprendre d'avantage et de gagner en  expérience.</p>

      <div class="divLog">
        <a href="https://www.linkedin.com/in/dalil-bousseiri-139024256/">
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
        <a href="https://github.com/Dalil03">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <button class="b" onclick="openCV()">Voir mon CV</button>
      </div>
    </div>

    <!-- Deuxieme grid -->
    <img class="div2" src="/Portfolio/Images/me.png" alt="" style="grid-area: div2;">
  </main>

  <!-- Modale pour afficher le CV -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCV()">&times;</span>
      <embed class="cv" src="/Portfolio/Images/cv-pic.png" type="application/pdf">
      <a href="cv.png" download><button class="download">Download</button></a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const menuIcon = document.querySelector('.menuIcon');
      const menuSlider = document.querySelector('.menuSlider');
      const closeMenuButton = document.querySelector('.closeMenuButton')

      menuIcon.addEventListener('click', () => {
        menuSlider.classList.add('showMenuSlider');
      });
      closeMenuButton.addEventListener('click', () => {
        menuSlider.classList.remove('showMenuSlider');
      });
    });

    function openCV() {
      document.getElementById('myModal').style.display = "block";
    }

    function closeCV() {
      document.getElementById('myModal').style.display = "none";
    }
  </script>
</body>

</html>
