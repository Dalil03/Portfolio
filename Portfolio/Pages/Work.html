<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins;
            color: white;
        }

        body {
            background-color: #242424;
        }

        nav {
            font-weight: 700;
            margin: 2rem;
            border-radius: 15px;
        }

        nav ul {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5rem;
            list-style-type: none;
            font-size: 1.3rem;
        }

        nav a {
            text-decoration: none;
        }

        nav Button {
            font-weight: 700;
      font-size: 1.3rem;
            padding: 15px;
            background-color: black;
            border-radius: 15px;
            cursor: pointer;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
          margin-top: 5rem;
           
            
        }

        h1 {
            font-size: 5rem;
            position: relative;
            bottom: 1rem;
            margin-bottom: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            width: 80%;
            justify-items: center;
            
        }

  

        .grid-container img {
            width: 100%;
            height: 100%;

            border-radius: 10px;
        }

        .box:hover {
            cursor: pointer;
            transform: scale(1.05);
            transition: all .3s ease;
        }

        ion-icon {
            margin-top: 1.8rem;
            font-size: 2.5rem;
        }

        .divLog {
            display: flex;
            gap: 1rem;
        }
        .menuIcon {
      cursor: pointer;
      display: none;
      margin: 6rem auto 0 auto;
      color: white;
      font-size: 4rem;
    }

    .closeMenuButton {
      position: absolute;
      left: 4rem;
      top: 2rem;
      cursor: pointer;
    }

    .menuSlider {
      height: 0;
      overflow: hidden;
      z-index: 1;
      left: 0;
      width: 100%;
      position: absolute;
      top: 0;
      background-color: #242424;
      transition: height 0.3s ease-in-out;
    }

    .menuSlider.showMenuSlider {
      height: 200px;
    }

    .menuSlider ul {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      font-size: 1.5rem;
      position: relative;
    }

    @media (max-width: 750px) {
      nav ul {
        gap: 1.5rem;
      }
    }

     @media (max-width: 548px) {
      nav ul {
        display: none;
      }

      .menuIcon {
        display: block;
      }

      .menuSlider{
        margin-top: 2rem;
      }

      main{
        margin-top: 7rem;
      }
   
    } 
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
        }


        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .grid-container {
                width: 100%;
            }

            .box {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="About.html">About me</a></li>
            <li>
                <Button><a href="">Contact</a></Button>
            </li>
        </ul>
        <ion-icon class="menuIcon" name="menu-outline"></ion-icon>
        <div class="menuSlider">
          <ul>
            <li><a href="About.html">About me</a></li>
            <button onclick="location.href='mailto:bousseirid@gmail.com'">Contact</button>
            <li><a href="index.html">Home</a></li>
            <ion-icon class="closeMenuButton" name="close-circle-outline"></ion-icon>
          </ul>
        </div>
    </nav>

    <main>
        <h1>My Work</h1>
        <div class="grid-container">
            <div class="box" data-url="https://github.com/Dalil03/Vivre-Debout">
                <img src="/Portfolio/Images/VivreDeboutPic.png" alt="Image 1">
            </div>
          
            <div class="box" data-url="https://github.com/Dalil03/Library">
                <img src="/Portfolio/Images/Library.png" alt="Image 2">
            </div>
            <div class="box" data-url="/clipBoard/clipboard-landing-page-master/index.html">
                <img src="/Portfolio/Images/landingPic.png" alt="Image 3">
            </div>
            <div class="box" data-url="/Qcm/QCM capitales/index.html">
              <img src="/Portfolio/Images/qcmPic.png" alt="Image 4">
          </div>
          <div class="box" data-url="/weather/Weather App/index.html">
            <img src="/Portfolio/Images/WeatherPic.png" alt="Image 5">
        </div>
        <div class="box" data-url="/FoodApi/FoodApi-main/Food API/index.html">
          <img src="/Portfolio/Images/foodPic.png" alt="Image 6">
      </div>
        </div>
    </main>

    <script>
           document.addEventListener('DOMContentLoaded', () => {
      const menuIcon = document.querySelector('.menuIcon');
      const menuSlider = document.querySelector('.menuSlider');
      const closeMenuButton = document.querySelector('.closeMenuButton')

      menuIcon.addEventListener('click', () => {
        menuSlider.classList.add('showMenuSlider');
      });
      closeMenuButton.addEventListener('click', () => {
        menuSlider.classList.remove('showMenuSlider');
      });
    });
        document.querySelectorAll('.box').forEach(box => {
            box.addEventListener('click', () => {
                const url = box.getAttribute('data-url');
                if (url) {
                    window.location.href = url;
                }
            });
        });
    </script>
</body>
</html>
